<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>CANVA</title>
  </head>
  <body>
    <h1>FAÇA SUA PIXEL ART</h1>

    <div class="canva-container"></div>
    <div class="color-container">
      <h2>ESCOLHA UMA COR</h2>
      <input type="color" class="canva-color" />
    </div>
    <div class="btn-container">
      <button class="canva-btn" onclick="clearColor()">LIMPAR <i class="bi bi-x"></i></button>
      <button class="canva-btn" onclick="undo()">DESFAZER <i class="bi bi-arrow-counterclockwise"></i></button>
      <button class="canva-btn" onclick="saveToPng()">SALVAR <i class="bi bi-download"></i></button>
    </div>

    
    

    <script src="script.js">
      
    </script>
  </body>
</html>
