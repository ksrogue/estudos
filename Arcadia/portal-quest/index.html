<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="components/GameCard.js" defer></script>
    <title>Portal Quest</title>
  </head>
  <body>
    <header>
      <div class="logo">
        <p>Portal Quest</p>
      </div>
      <ul class="nav">
        <li><a href="#">Home</a></li>
        <li><a href="#">Jogos</a></li>
        <li><a href="#">Notícias</a></li>
        <li><a href="#">Contato</a></li>
      </ul>
    </header>
    <main>
      <section class="hero">
        <h1>Explore os Maiores RPGs de Todos os Tempos</h1>
        <h3>
          Notícias, curiosidades, guias e histórias dos RPGs que marcaram
          gerações.
        </h3>
        <button>Explorar</button>
      </section>

      <section class="card-container">
        <game-card
          card-src="assets/placeholder.png"
          card-alt="imagem do jogo dragon quest"
          card-title="Dragon Quest VIII"
          card-span="Acompanhe a jornada do herói amaldiçoado em uma das aventuras mais amadas da série Dragon Quest."
        ></game-card>
        <game-card
          card-src="assets/placeholder.png"
          card-alt="imagem do jogo chrono trigger"
          card-title="Chrono Trigger"
          card-span="Viaje através do tempo para impedir uma catástrofe e descobrir um dos maiores clássicos da história dos RPGs."
        ></game-card>
        <game-card
          card-src="assets/placeholder.png"
          card-alt="imagem do jogo final fantasy vi"
          card-title="Final Fantasy VI"
          card-span="Enfrente o império e acompanhe uma narrativa épica com personagens inesquecíveis."
        ></game-card>
      </section>
    </main>

    <footer>
      <span>© 2026 Portal Quest. Todos os direitos reservados.</span>
      <ul class="social">
        <li><a href="https://instagram.com/ks.rogue"><i class="bi bi-instagram"></i></a></li>
        <li><a href="https://linkedin.com/in/ksrogue"><i class="bi bi-linkedin"></i></a></li>
        <li><a href="https://github.com/ksrogue"><i class="bi bi-github"></i></a></li>
      </ul>
    </footer>
  </body>
</html>
