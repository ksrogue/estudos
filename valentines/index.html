<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feliz Dia dos Namorados!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="media.css">
  </head>
  <body>
    <header>
      <h1>Feliz Dia dos Namorados, meu amor!</h1>
      <p class="frase-namoro">
        "Namorar é encontrar em outro coração o porto seguro para ancorar a
        nossa própria felicidade."
      </p>
    </header>

    <main class="album-container">
      <div class="foto-card" style="--rotacao: -3deg">
        <img src="images/img1.jpg" alt="Nosso momento" />
        <p class="legenda">Onde tudo começou...</p>
      </div>

      <div class="foto-card" style="--rotacao: 2deg">
        <img src="images/img2.jpg" alt="Nosso momento" />
        <p class="legenda">Do lolzinho para a vida.</p>
      </div>

      <div class="foto-card" style="--rotacao: -1deg">
        <img src="images/img3.jpg" alt="Nosso momento" />
        <p class="legenda">Te amo MUITO!</p>
      </div>

      <div class="foto-card" style="--rotacao: 4deg">
        <img src="images/img4.jpg" alt="Nosso momento" />
        <p class="legenda">❤️</p>
      </div>
    </main>

    <footer>
      <span class="rodape-texto">Feito com amor pra você ❤️</span>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
