<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/index.css" />
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/mediaQuery.css">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <title>Ks Sistema de Portaria | Login</title>
  </head>
  <body>
    <header>
      <div class="header-wrapper">
        <h1>KS PORTARIA</h1>
        <div class="btn-container">
          <i class="bi bi-info-circle-fill info"></i>
          <i class="bi bi-brightness-high-fill theme"></i>
        </div>
      </div>
      <p class="info-bar"></p>
    </header>

    <div class="login-container">
      <h2>Faça seu LOGIN</h2>
      <form action="" class="login-form">
        <input
          type="text"
          name="login"
          id="login"
          placeholder="entre com seu usuário"
        />
        <input
          type="password"
          name="password"
          id="password"
          placeholder="entre com sua senha"
        />
        <button class="form-btn">ENTRAR</button>
        <span class="form-spn"></span>
      </form>
    </div>

    <footer>
      <p>
        Desenvolvido por
        <a href="https://instagram.com/ks.rogue">David William</a>.
      </p>
    </footer>

    <script src="src/scripts/index.js"></script>
    <script src="src/scripts/global.js"></script>
  </body>
</html>
