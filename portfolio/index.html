<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Portifólio David William</title>
  </head>
  <body>
    <main class="card-container">
      <header class="header">
        <h1>
          Olá,<br />
          sou o <span id="nome"></span>
        </h1>
        <img class="img" src="assets/david.png" alt="foto de david william" />
        <ul>
          <li><i class="bi bi-person-fill"></i> <span class="role"></span></li>
          <li>
            <i class="bi bi-geo-alt-fill"></i> <span class="local"></span>
          </li>
          <li><i class="bi bi-whatsapp"></i> <span class="tel"></span></li>
          <li>
            <i class="bi bi-envelope-at-fill"></i> <span class="email"></span>
          </li>
        </ul>
      </header>

      <details class="skills">
        <summary>Skills</summary>
        <h3>Tecnologias:</h3>
        <ul>
          <li><i class="bi bi-filetype-html"></i></li>
          <li><i class="bi bi-filetype-css"></i></li>
          <li><i class="bi bi-filetype-js"></i></li>
        </ul>
        <h3>Pessoal:</h3>
        <ul>
          <li class="softSkill"></li>
          <li class="softSkill"></li>
          <li class="softSkill"></li>
        </ul>
      </details>

      <details class="language">
        <summary>Idiomas</summary>
        <ul>
          <li class="userLanguage"></li>
          <li class="userLanguage"></li>
        </ul>
      </details>

      <details class="project">
        <summary>Projetos</summary>
        <div class="image-container">
          <i class="bi bi-chevron-compact-left"></i>
          <ul class="carousel">
            <li class="carousel-item">
              <img src="assets/pPlaceholder.png" alt="" />
            </li>
            <!-- <li class="carousel-item"><img src="assets/pPlaceholder.png" alt=""></li> -->
          </ul>
          <i class="bi bi-chevron-compact-right"></i>
        </div>
      </details>

      <details class="social-media">
        <summary>Redes Sociais</summary>
        <ul>
          <li class="userSocial">
            
          </li>
          <li class="userSocial">
            
          </li>
          <li class="userSocial">
            
          </li>
        </ul>
      </details>
    </main>

    <script src="data/api.js"></script>
    <script src="data/app.js"></script>
  </body>
</html>
