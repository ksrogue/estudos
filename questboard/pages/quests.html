<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/home.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <img
        src="../assets/images/banner.png"
        alt="bandeira do quadro de missões"
      />
      <div class="header-container">
        <h1 class="title">QUADRO DE MISSÕES</h1>
        <span>- suas tarefas organizadas de um jeito mais interessante -</span>
      </div>
      <i class="bi bi-moon-fill theme-btn"></i>
    </header>

    <main>
      <h2 class="greetings">BOM DIA, DAVID!</h2>
      <section class="status">
        <div class="avatar-img"></div>
        <div class="level">
          <h3>nível 1</h3>
          <div class="xp-container">
            <div class="xp-progress"></div>
            <span class="xp-text">100/100 xp</span>
          </div>
        </div>
      </section>
      <section class="tasks">
        <h2>MISSÕES DO DIA</h2>
        <div class="add-mission">
          <h3>ADICIONE UMA MISSÃO</h3>
          <button class="add-mission-btn">+</button>
        </div>

        <div class="add-mission-container">
          <div class="mission-icon"></div>
          <div class="input-container">
            <input
              type="text"
              class="mission-name"
              placeholder="nome da missão"
              required
            />
            <input
              type="text"
              class="mission-desc"
              placeholder="descrição"
              required
            />
            <span class="input-status"></span>
          </div>
          <button class="add-btn">adicionar</button>
        </div>
        
        <div class="mission-container">
          <!-- missões -->
        </div>
      </section>
    </main>
    <script src="../js/app.js"></script>
    <script src="../js/home.js"></script>
  </body>
</html>
