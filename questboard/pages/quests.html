<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <link rel="stylesheet" href="../assets/home.css" />
    <title>Missões - home</title>
  </head>
  <body>
    <header>
      <img
        src="../assets/images/banner.png"
        alt="bandeira do quadro de missões"
      />
      <div class="header-container">
        <h1 class="title">QUADRO DE MISSÕES</h1>
        <span>- suas tarefas organizadas de um jeito mais interessante -</span>
      </div>
      <i class="bi bi-moon-fill theme-btn"></i>
    </header>

    <main>
      <h2 class="greetings">BOM DIA, DAVID!</h2>
      <section class="status">
        <div class="avatar-img"></div>
        <div class="level">
          <h3 class="level-number">nível 1</h3>
          <div class="xp-container">
            <div class="xp-progress"></div>
            <span class="xp-text">0/100 xp</span>
          </div>
        </div>
      </section>
      <section class="tasks">
        <h2>MISSÕES</h2>

        <div class="add-task-container">
          <button class="add-task-btn">+</button>
          <span>CRIAR NOVA MISSÃO</span>
        </div>
        <div class="new-task-container">
          <div class="close-container">
            <span class="close-btn">x</span>
          </div>
          <div class="input-container">
            <div class="icon">
              <img src="../assets/images/icons/icon1.png" class="icon-img">
            </div>
            <div class="icon-container">
              
            </div>
            <input
              type="text"
              name="name"
              class="input-name"
              placeholder="nome da missão"
              maxlength="20"
              required
            />
            <input
              type="text"
              name="desc"
              class="input-desc"
              placeholder="descrição - max 20 caracteres"
              maxlength="20"
              required
            />
          </div>

          <div class="warning-container">
            <button class="create-task-btn">adicionar</button>
            <span class="warning-text">dados inválidos.</span>
          </div>
        </div>

        <div class="task-container">

          <!-- <div class="task checked">
            <div class="button-container">
              <div class="check-button">x</div>
              <div class="del-button">
                <i class="bi bi-trash3-fill"></i>
              </div>
            </div>
            <div class="icon"></div>
            <div class="text-container">
              <h3 class="task-name">estudar javascript</h3>
              <span class="task-description">praticar por 2 horas</span>
            </div>
            <div class="exp-container">
              <p class="exp">+50</p>
              <span>XP</span>
            </div>
          </div> -->
            
      </section>
    </main>

    <footer></footer>
    <script src="../js/app.js"></script>
    <script src="../js/home.js"></script>
  </body>
</html>
