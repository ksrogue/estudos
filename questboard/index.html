<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/login.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <title>Missões - Login</title>
  </head>
  <body>
    <header>
      <img src="assets/images/banner.png" alt="bandeira do quadro de missões" />
      <div class="header-container">
        <h1 class="title">QUADRO DE MISSÕES</h1>
        <span>- sua vida organizada de um jeito mais interessante -</span>
      </div>
      <i class="bi bi-moon-fill theme-btn"></i>
    </header>
    <main class="login-container">
      <h2>faça seu login</h2>
      <div class="input-container">
        <input type="text" placeholder="usuário" id="login" required />
        <input type="password" placeholder="senha" id="password" required />
        <button class="login-button">logar</button>
        <span class="error"><br /></span>
        <a href="#" class="register-link">registre-se</a>
      </div>
    </main>
    <footer>
      <p>
        Desenvolvido por
        <a href="https://www.instagram.com/ks.rogue" target="_blank"
          >David William</a
        >
      </p>
    </footer>

    <script src="js/login.js"></script>
  </body>
</html>
