<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Quadro de Missões</title>
</head>
<body>
    <header>
        <div class="banner">
            <img src="assets/images/banner.png" alt="bandeira ks">
        </div>
        <div class="text-wrapper">
            <h1>QUADRO DE MISSÕES</h1>
            <span class="greetings">Bom dia,  David!</span>
        </div>
        <i class="bi bi-list menu"></i>
    </header>
    <main>
        <section class="exp-container">
            <div class="avatar"></div>
            <div class="level-container">
                <p class="level-text">Nível 1</p>
                <span class="level-bar">0 / 100 XP</span>
            </div>
        </section>
        <section class="daily-quests">
            <h2>MISSÕES DO DIA</h2>
            <div class="quests-container">
                <div class="quest">
                    <input type="checkbox" class="quest-status">
                    <div class="icon"></div>
                    <div class="desc-wrapper">
                        <h3 class="quest-title">Estudar 2 horas</h3>
                        <span class="quest-desc">Dedique-se ao aprendizado.</span>
                        <span class="quest-goal">0/60min</span>
                    </div>
                    <div class="xp-reward">
                        <span class="xp-number">+50</span>
                        <span>XP</span>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- <footer>
        <div class="missions"><i class="bi bi-book-fill"></i>MISSÕES</div>
        <div class="settings"><i class="bi bi-gear-fill"></i>CONFIG</div>
        <div class="profile"><i class="bi bi-person-fill"></i>PERFIL</div>
    </footer> -->


    <script src="js/app.js"></script>
</body>
</html>
