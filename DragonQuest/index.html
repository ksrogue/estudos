<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/global.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="assets/css/responsive.css" />

    <script src="src/components/CardNews.js" defer></script>
    <script src="src/components/GamesCard.js" defer></script>
    <title>Portal DQ</title>
  </head>
  <body>
    <header>
      <nav>
        <button class="menu" onclick="toggleMenu()"><i class="bi bi-list menu-icon"></i></button>
       
        <img src="assets/images/logo-light.png" alt="logo do site" class="logo">
       
        <button>
          <i class="bi bi-brightness-high-fill theme"></i>
        </button>
      </nav>
      <ul class="menu-bar">
        <li><a href="#">NOTÍCIAS</a></li>
        <li><a href="#">JOGOS</a></li>
        <li><a href="#">GALERIA</a></li>
        <li><a href="#">GUIAS</a></li>
        <li><a href="#">OUTROS</a></li>
      </ul>
    </header>
    <main>
      <section class="featured">
        <span class="span-text">DESTAQUE</span>
        <h1 class="featured-title">Título do destaque</h1>
        <p class="featured-text">Descrição do destaque</p>
        <div class="featured-btn"><a href="#">SAIBA MAIS</a></div>
      </section>

      <section class="card-container">
        <div class="text-wrapper">
          <h2>ÚLTIMAS NOTÍCIAS</h2>
          <a href="#" class="span-text"
            >VER TODAS <i class="bi bi-chevron-right"></i
          ></a>
        </div>
        <card-news
          news-src="assets/images/dq12.png"
          news-alt="protagonista do dragon quest 12"
          news-title="Dragon Quest XII é finalmente anunciado, mas inteiramente refeito."
          news-time="15 minutos atrás"
        ></card-news>
        <card-news
          news-src="assets/images/dq11news.webp"
          news-alt="fan art dragon quest 11"
          news-title="Dragon Quest XI relançado para Nintendo Switch 2"
          news-time="1 hora atrás"
        ></card-news>
        <card-news
          news-src="assets/images/dq8.png"
          news-alt="capa do dragon quest 8"
          news-title="Dragon Quest 8 remake, um sonho distante?"
          news-time="12 horas atrás"
        ></card-news>
      </section>

      <section class="card-container">
        <div class="text-wrapper">
          <h2>JOGOS DA SÉRIE</h2>
          <a href="#" class="span-text"
            >VER TODOS <i class="bi bi-chevron-right"></i
          ></a>
        </div>
        <div class="games-wrapper">
          <!-- <games-card
            game-src="assets/images/b-placeholder.png"
            game-alt="personagem do dragon quest 1"
            game-name="DQ I"
          ></games-card>
          <games-card
            game-src="assets/images/b-placeholder.png"
            game-alt="personagem do dragon quest 2"
            game-name="DQ II"
          ></games-card>
          <games-card
            game-src="assets/images/b-placeholder.png"
            game-alt="personagem do dragon quest 3"
            game-name="DQ III"
          ></games-card>
          <games-card
            game-src="assets/images/b-placeholder.png"
            game-alt="personagem do dragon quest 4"
            game-name="DQ IV"
          ></games-card>
        </div> -->
      </section>

      <section class="card-container">
        <div class="text-wrapper">
          <h2>GALERIA EM DESTAQUE</h2>
          <a href="#" class="span-text"
            >EXPANDIR <i class="bi bi-chevron-right"></i
          ></a>
        </div>

        <ul class="gallery-wrapper"></ul>
      </section>
    </main>
